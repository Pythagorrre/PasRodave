name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Build PasRodave
        run: |
          xcodebuild \
            -project QuickRecorder.xcodeproj \
            -scheme QuickRecorder \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build
